name: Run Sahyog Enterprise Sync

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Hindi & Unicode Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-indic fonts-noto
          fc-cache -f -v

      - name: Install Python Libraries
        run: pip install -r requirements.txt

      - name: Run Sahyog Automation
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SAHYOG_USER: ${{ secrets.SAHYOG_USER }}
          SAHYOG_PASS: ${{ secrets.SAHYOG_PASS }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python sahyog_enterprise_sync.py
