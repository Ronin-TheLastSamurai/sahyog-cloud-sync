name: Run Sahyog Enterprise Sync

# This line allows you to trigger the script manually
on:
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest # This is the Linux server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl selenium pypdf

      - name: Run Sahyog Automation
        # This is where GitHub whispers the secrets to the server
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SAHYOG_USER: ${{ secrets.SAHYOG_USER }}
          SAHYOG_PASS: ${{ secrets.SAHYOG_PASS }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python sahyog_enterprise_sync.py
